<meta charset="utf-8">
{{ hugo.Generator }}
<meta name="language" content="fi" />
<meta name="author" content="Jarno Ruokamo" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
{{ $style := resources.Get "css/style.css" | resources.Fingerprint }}
<link rel="stylesheet" href="{{ $style.RelPermalink }}">
{{ $fav2 := resources.Get "png/favicon.webp" }}
{{ $fav := $fav2.Resize "48x48" }}
{{ $png := $fav2.Resize "48x48 png" }}
<link rel="icon" href="{{ $png.RelPermalink }}" type="image/png" />
<link rel="icon" href="{{ $fav.RelPermalink }}" type="image/webp" />
<style>
	header {
		margin-top: 3.5rem;
	}
	nav {
		position: fixed;
		top: 0;
		height: 3.5rem;
	}
</style>
