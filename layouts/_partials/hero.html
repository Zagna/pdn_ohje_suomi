<header>
	<a href="{{ .Site.BaseURL }}">
		<picture>
			{{ $fav2 := resources.Get "png/favicon.webp" | resources.Fingerprint }}
			{{ $fav := $fav2.Resize "48x48" }}
			{{ $avif2 := $fav2.Resize "96x96 avif" }}
			{{ $avif := $fav2.Resize "48x48 avif" }}
			<source type="image/avif" srcset="{{ $avif.RelPermalink }}, {{ $avif2.RelPermalink }} 2x">
			<img loading="eager" id="favicon" src="{{ $fav.RelPermalink }}" srcset="{{ $fav2.RelPermalink }} 2x" alt="paint.net logo" width="{{ $fav.Width }}" height="{{ $fav.Height }}">
		</picture>
		<h1>paint.net ohje</h1>
	</a>
</header>
